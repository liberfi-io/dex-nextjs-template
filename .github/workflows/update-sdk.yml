name: Update SDK Dependencies

on:
  repository_dispatch:
    types: [sdk-released]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Update @liberfi.io/* packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Update @liberfi.io/* versions
        id: update
        run: |
          node -e "
          const { execSync } = require('child_process');
          const fs = require('fs');

          // Find all package.json files (excluding node_modules)
          const files = execSync('find . -name package.json -not -path \"*/node_modules/*\"')
            .toString().trim().split('\n').filter(Boolean);

          // Collect all unique @liberfi.io/* and @chainstream-io/sdk package names
          const pkgNames = new Set();
          let hasChainstream = false;

          for (const f of files) {
            try {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[section]) continue;
                for (const name of Object.keys(pkg[section])) {
                  if (name.startsWith('@liberfi.io/')) pkgNames.add(name);
                  if (name === '@chainstream-io/sdk') hasChainstream = true;
                }
              }
            } catch {}
          }

          console.log('Packages to check:', [...pkgNames].join(', '));

          // Fetch latest versions from npm
          const versions = {};
          for (const name of pkgNames) {
            try {
              const ver = execSync('npm view ' + name + ' version 2>/dev/null')
                .toString().trim();
              if (ver) versions[name] = ver;
            } catch {
              console.log('⚠️  Could not fetch ' + name);
            }
          }

          // Fetch @chainstream-io/sdk version from @liberfi.io/client's deps
          let csSdkVersion = '';
          if (hasChainstream) {
            try {
              const raw = execSync('npm view @liberfi.io/client dependencies --json 2>/dev/null')
                .toString().trim();
              const deps = JSON.parse(raw);
              csSdkVersion = (deps['@chainstream-io/sdk'] || '').replace(/[\\^~>=]/g, '');
              if (csSdkVersion) console.log('@chainstream-io/sdk (via @liberfi.io/client) → ' + csSdkVersion);
            } catch {}
          }

          // Update all package.json files
          let anyChange = false;
          for (const f of files) {
            try {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              let fileChanged = false;

              for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[section]) continue;

                for (const [name, latest] of Object.entries(versions)) {
                  if (!pkg[section][name]) continue;
                  const prefix = section === 'peerDependencies' ? '>=' : '^';
                  const newVer = prefix + latest;
                  if (pkg[section][name] !== newVer) {
                    console.log(f + ': ' + section + ' ' + name + ' ' + pkg[section][name] + ' → ' + newVer);
                    pkg[section][name] = newVer;
                    fileChanged = true;
                  }
                }

                if (csSdkVersion && pkg[section]['@chainstream-io/sdk']) {
                  const prefix = section === 'peerDependencies' ? '>=' : '^';
                  const newVer = prefix + csSdkVersion;
                  if (pkg[section]['@chainstream-io/sdk'] !== newVer) {
                    console.log(f + ': ' + section + ' @chainstream-io/sdk ' + pkg[section]['@chainstream-io/sdk'] + ' → ' + newVer);
                    pkg[section]['@chainstream-io/sdk'] = newVer;
                    fileChanged = true;
                  }
                }
              }

              if (fileChanged) {
                fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
                anyChange = true;
              }
            } catch {}
          }

          if (!anyChange) {
            console.log('✅ All packages already up to date');
            process.exit(0);
          }

          // Signal that updates were made
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_updates=true\n');
          "

      - name: Install dependencies
        if: steps.update.outputs.has_updates == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Commit and push
        if: steps.update.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update @liberfi.io/* SDK dependencies"
          git push
